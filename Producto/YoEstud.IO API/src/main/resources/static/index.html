<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOESTUD.IO - Test Asistente IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .chat-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        #chat-log { height: 300px; border: 1px solid #ddd; overflow-y: scroll; margin-bottom: 10px; padding: 10px; text-align: left; background: #fafafa; border-radius: 8px; }
        #user-input { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; }
        .user { background: #d1ecf1; text-align: right; }
        .ai { background: #e2e3e5; text-align: left; }
    </style>
</head>
<body>

    <div class="chat-container">
        <h1>🎓 Tutor YOESTUD.IO</h1>
        <div id="chat-log"></div>
        <input type="text" id="user-input" placeholder="Pregúntale algo a tu tutor..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const userInput = document.getElementById('user-input');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = (role === 'user' ? 'Tú: ' : 'IA: ') + text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            try {
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: text
                });

                if (response.ok) {
                    const data = await response.text();
                    appendMessage('ai', data);
                } else {
                    appendMessage('ai', 'Ups, algo falló al conectar.');
                }
            } catch (error) {
                appendMessage('ai', 'Error: No se pudo conectar al servidor.');
            }
        }
    </script>
</body>
</html>
