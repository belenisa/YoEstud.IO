spring.application.name=Yoestudio

# NEON (URL Corregida para JDBC)
#jdbc:postgresql://ep-gentle-mouse-amcubxzv-pooler.c-5.us-east-1.aws.neon.tech:6543/neondb?sslmode=require
spring.datasource.url=jdbc:postgresql://ep-gentle-mouse-amcubxzv.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_n5CFb8WQILkq
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (optimizado)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.leak-detection-threshold=60000

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_duration_jdbc_type=VARCHAR

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Gemini (La clave se carga desde apis.txt en YoEstudioApplication.java)
spring.ai.google.ai.chat.options.model=gemini-1.5-flash
API_KEY=${MI_PASSWORD}
# Otros
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
